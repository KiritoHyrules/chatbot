<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEE-UNI Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family: system-ui, -apple-system, sans-serif; height:100vh; display:flex; background:#f5f5f5 }
.sidebar { width:320px; background:#1e293b; color:#fff; display:flex; flex-direction:column; flex-shrink:0 }
.sidebar-header { padding:16px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center }
.sidebar-header h2 { font-size:16px; font-weight:600 }
.sidebar-header .badge { background:#475569; font-size:12px; padding:2px 8px; border-radius:10px }
.conv-list { flex:1; overflow-y:auto; padding:8px }
.conv-item { padding:12px; border-radius:8px; cursor:pointer; margin-bottom:4px; transition:background .15s }
.conv-item:hover { background:#334155 }
.conv-item.active { background:#0ea5e9 }
.conv-item .phone { font-size:14px; font-weight:600; margin-bottom:2px }
.conv-item .name { font-size:12px; color:#94a3b8 }
.conv-item .preview { font-size:12px; color:#64748b; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.conv-item .mode-tag { display:inline-block; font-size:11px; padding:1px 6px; border-radius:4px; margin-top:4px }
.mode-tag.ai { background:#065f46; color:#6ee7b7 }
.mode-tag.human { background:#92400e; color:#fcd34d }
.main { flex:1; display:flex; flex-direction:column; background:#fff }
.main-empty { flex:1; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-size:18px }
.header { padding:16px 24px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; background:#fafbfc }
.header .info .phone { font-size:14px; font-weight:600; color:#1e293b }
.header .info .name { font-size:12px; color:#64748b }
.toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:14px; font-weight:500 }
.toggle .switch { width:44px; height:24px; background:#e2e8f0; border-radius:12px; position:relative; transition:background .2s }
.toggle .switch.on { background:#065f46 }
.toggle .switch.off { background:#92400e }
.toggle .switch::after { content:''; width:20px; height:20px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:transform .2s }
.toggle .switch.on::after { transform:translateX(20px) }
.toggle .switch.off::after { transform:translateX(0) }
.messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:8px }
.bubble { max-width:70%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word }
.bubble.user { align-self:flex-end; background:#dcfce7; color:#14532d; border-bottom-right-radius:4px }
.bubble.assistant { align-self:flex-start; background:#f1f5f9; color:#334155; border-bottom-left-radius:4px }
.bubble.human { align-self:flex-end; background:#dbeafe; color:#1e3a5f; border-bottom-right-radius:4px; border:1px solid #93c5fd }
.bubble .ts { font-size:10px; color:#94a3b8; margin-top:4px; text-align:right }
.input-bar { padding:16px 24px; border-top:1px solid #e2e8f0; display:flex; gap:8px; background:#fafbfc }
.input-bar input { flex:1; padding:10px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; outline:none; transition:border .15s }
.input-bar input:focus { border-color:#0ea5e9 }
.input-bar input:disabled { background:#f8fafc; color:#94a3b8 }
.input-bar button { padding:10px 20px; background:#0ea5e9; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background .15s }
.input-bar button:hover { background:#0284c7 }
.input-bar button:disabled { background:#cbd5e1; cursor:not-allowed }
.error { padding:12px 24px; background:#fef2f2; color:#dc2626; font-size:13px; display:none }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h2>CEE-UNI Dashboard</h2>
    <span class="badge" id="convCount">0</span>
  </div>
  <div class="conv-list" id="convList">
    <div style="padding:16px;color:#64748b;font-size:14px">Esperando conversaciones...</div>
  </div>
</div>
<div class="main" id="main">
  <div class="main-empty" id="emptyState">Selecciona una conversación</div>
  <div id="chatView" style="display:none;flex:1;display:none;flex-direction:column">
    <div class="header">
      <div class="info">
        <div class="phone" id="chatPhone"></div>
        <div class="name" id="chatName"></div>
      </div>
      <div class="toggle" id="modeToggle" onclick="toggleMode()">
        <span id="modeLabel">AI</span>
        <div class="switch on" id="modeSwitch"></div>
      </div>
    </div>
    <div class="error" id="errorBar"></div>
    <div class="messages" id="messages"></div>
    <div class="input-bar" id="inputBar">
      <input type="text" id="msgInput" placeholder="Escribe un mensaje..." disabled>
      <button id="sendBtn" disabled>Enviar</button>
    </div>
  </div>
</div>
<script>
let state = null
let selectedPhone = null
let interval = null

async function fetchState() {
  try {
    const r = await fetch('/api/dashboard/state')
    state = await r.json()
    renderSidebar()
    if (selectedPhone) renderChat()
  } catch(e) { showError('Error al obtener estado: ' + e.message) }
}

function renderSidebar() {
  const convs = state.conversations || []
  document.getElementById('convCount').textContent = convs.length
  const list = document.getElementById('convList')
  if (!convs.length) {
    list.innerHTML = '<div style="padding:16px;color:#64748b;font-size:14px">Sin conversaciones aún</div>'
    return
  }
  list.innerHTML = convs.map(c => {
    const lastMsg = c.messages?.length ? c.messages[c.messages.length-1] : null
    const preview = lastMsg ? (lastMsg.role === 'human' ? '[Tú] ' : '') + lastMsg.content.substring(0,40) : ''
    return `<div class="conv-item ${c.phone===selectedPhone?'active':''}" onclick="selectConv('${c.phone}')">
      <div class="phone">${c.name || c.phone}</div>
      <div class="name">${c.name && c.name !== c.phone ? c.phone : ''}</div>
      <div class="preview">${preview}</div>
      <span class="mode-tag ${c.mode==='AI'?'ai':'human'}">${c.mode}</span>
    </div>`
  }).join('')
}

function selectConv(phone) {
  selectedPhone = phone
  renderSidebar()
  renderChat()
  document.getElementById('emptyState').style.display = 'none'
  document.getElementById('chatView').style.display = 'flex'
}

function renderChat() {
  const conv = state.conversations.find(c => c.phone === selectedPhone)
  if (!conv) return

  document.getElementById('chatPhone').textContent = conv.phone
  document.getElementById('chatName').textContent = conv.name && conv.name !== conv.phone ? conv.name : ''
  document.getElementById('modeLabel').textContent = conv.mode
  const sw = document.getElementById('modeSwitch')
  sw.className = 'switch ' + (conv.mode === 'AI' ? 'on' : 'off')

  const isHuman = conv.mode === 'HUMAN'
  document.getElementById('msgInput').disabled = !isHuman
  document.getElementById('sendBtn').disabled = !isHuman
  document.getElementById('msgInput').placeholder = isHuman ? 'Escribe un mensaje...' : 'Cambia a modo HUMAN para escribir'

  const msgs = document.getElementById('messages')
  msgs.innerHTML = conv.messages?.map(m => `<div class="bubble ${m.role}">
    <div>${escapeHtml(m.content)}</div>
    <div class="ts">${new Date(m.ts).toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'})}</div>
  </div>`).join('') || ''

  msgs.scrollTop = msgs.scrollHeight
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

async function toggleMode() {
  if (!selectedPhone) return
  const conv = state.conversations.find(c => c.phone === selectedPhone)
  if (!conv) return
  const newMode = conv.mode === 'AI' ? 'HUMAN' : 'AI'
  try {
    await fetch('/api/dashboard/mode', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone: selectedPhone, mode: newMode })
    })
    await fetchState()
  } catch(e) { showError('Error al cambiar modo: ' + e.message) }
}

async function sendMessage() {
  const input = document.getElementById('msgInput')
  const msg = input.value.trim()
  if (!msg || !selectedPhone) return
  try {
    await fetch('/api/dashboard/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone: selectedPhone, message: msg })
    })
    input.value = ''
    await fetchState()
  } catch(e) { showError('Error al enviar: ' + e.message) }
}

document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key==='Enter') sendMessage() })
document.getElementById('sendBtn').addEventListener('click', sendMessage)

function showError(msg) {
  const bar = document.getElementById('errorBar')
  bar.textContent = msg
  bar.style.display = 'block'
  setTimeout(() => bar.style.display = 'none', 4000)
}

fetchState()
interval = setInterval(fetchState, 3000)
</script>
</body>
</html>
